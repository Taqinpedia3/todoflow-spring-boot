<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="shell">
        <section class="auth-view" id="authView">
            <div class="brand-panel">
                <p class="eyebrow">Spring Boot Todo</p>
                <h1>Dashboard tugas harian</h1>
                <p class="intro">Masuk, kelola prioritas, dan lihat bagaimana frontend memakai REST API yang sudah kamu bangun.</p>
                <div class="stat-strip">
                    <div>
                        <strong>JWT</strong>
                        <span>Auth</span>
                    </div>
                    <div>
                        <strong>CRUD</strong>
                        <span>Todo</span>
                    </div>
                    <div>
                        <strong>JPA</strong>
                        <span>Data</span>
                    </div>
                </div>
            </div>

            <div class="auth-panel">
                <div class="tabs" role="tablist" aria-label="Auth mode">
                    <button class="tab active" id="loginTab" type="button">Login</button>
                    <button class="tab" id="registerTab" type="button">Register</button>
                </div>

                <form class="auth-form" id="loginForm">
                    <label>
                        Email
                        <input id="loginEmail" type="email" autocomplete="email" value="demo@example.com" required>
                    </label>
                    <label>
                        Password
                        <input id="loginPassword" type="password" autocomplete="current-password" value="password123" required>
                    </label>
                    <button class="primary" type="submit">Masuk</button>
                </form>

                <form class="auth-form hidden" id="registerForm">
                    <label>
                        Nama
                        <input id="registerName" type="text" autocomplete="name" required>
                    </label>
                    <label>
                        Email
                        <input id="registerEmail" type="email" autocomplete="email" required>
                    </label>
                    <label>
                        Password
                        <input id="registerPassword" type="password" autocomplete="new-password" minlength="8" required>
                    </label>
                    <button class="primary" type="submit">Buat akun</button>
                </form>

                <p class="message" id="authMessage" role="status"></p>
            </div>
        </section>

        <section class="dashboard hidden" id="dashboardView">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Todo Dashboard</p>
                    <h1>Rencana hari ini</h1>
                </div>
                <div class="user-box">
                    <span id="userName">User</span>
                    <button class="ghost" id="notificationButton" type="button">Aktifkan alarm</button>
                    <button class="ghost" id="logoutButton" type="button">Keluar</button>
                </div>
            </header>

            <section class="metrics" aria-label="Todo stats">
                <div class="metric">
                    <span>Total</span>
                    <strong id="totalCount">0</strong>
                </div>
                <div class="metric">
                    <span>Selesai</span>
                    <strong id="doneCount">0</strong>
                </div>
                <div class="metric">
                    <span>Aktif</span>
                    <strong id="activeCount">0</strong>
                </div>
            </section>

            <section class="work-area">
                <form class="composer" id="todoForm">
                    <input id="todoTitle" type="text" placeholder="Tulis tugas baru" maxlength="160" required>
                    <input id="todoDueAt" type="datetime-local" aria-label="Waktu alarm">
                    <button class="primary" type="submit">Tambah</button>
                </form>

                <div class="toolbar">
                    <input id="searchInput" type="search" placeholder="Cari tugas">
                    <select id="filterSelect" aria-label="Filter status">
                        <option value="">Semua</option>
                        <option value="false">Aktif</option>
                        <option value="true">Selesai</option>
                    </select>
                    <select id="sortSelect" aria-label="Urutkan">
                        <option value="createdAt,desc">Terbaru</option>
                        <option value="createdAt,asc">Terlama</option>
                        <option value="title,asc">A-Z</option>
                        <option value="completed,asc">Aktif dulu</option>
                    </select>
                </div>

                <div class="todo-list" id="todoList" aria-live="polite"></div>

                <footer class="pager">
                    <button class="ghost" id="prevPage" type="button">Sebelumnya</button>
                    <span id="pageInfo">Halaman 1</span>
                    <button class="ghost" id="nextPage" type="button">Berikutnya</button>
                </footer>

                <p class="message" id="todoMessage" role="status"></p>
            </section>
        </section>
    </main>

    <dialog class="edit-dialog" id="editDialog">
        <form class="edit-form" id="editForm" method="dialog">
            <div>
                <p class="eyebrow">Edit Todo</p>
                <h2>Perbarui tugas</h2>
            </div>
            <label>
                Judul
                <input id="editTitle" type="text" maxlength="160" required>
            </label>
            <label>
                Waktu alarm
                <input id="editDueAt" type="datetime-local">
            </label>
            <label class="check-row">
                <input id="editCompleted" type="checkbox">
                Tandai selesai
            </label>
            <div class="dialog-actions">
                <button class="ghost" id="cancelEdit" type="button">Batal</button>
                <button class="primary" type="submit">Simpan</button>
            </div>
        </form>
    </dialog>

    <script src="/app.js"></script>
</body>
</html>
