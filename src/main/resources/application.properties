spring.application.name=todo-api
spring.profiles.default=dev
app.jwt.secret=${JWT_SECRET:todo-api-demo-secret-key-must-be-at-least-32-bytes}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.seed-demo=false
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true
info.app.name=TodoFlow
info.app.description=Spring Boot Todo portfolio application
