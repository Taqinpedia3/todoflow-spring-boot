services:
  app:
    build: .
    container_name: todoflow-app
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-todo_db}
      DATABASE_USERNAME: ${POSTGRES_USER:-todo_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-todo_password}
      JWT_SECRET: ${JWT_SECRET:-local-docker-secret-key-must-be-at-least-32-bytes}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: todo-api-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo_db}
      POSTGRES_USER: ${POSTGRES_USER:-todo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - todo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo_user} -d ${POSTGRES_DB:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  todo_postgres_data:
